spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankcards}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      use-new-id-generator-mappings: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/migration/master.xml
    enabled: true

jwt:
  secret: ${JWT_SECRET:ThisIsAReallyLongAndSecureSecretForHS512SignatureWhichIsOver48BytesLong!!!}
  expiration: 86400000

logging:
  level:
    com.example.bankcards: DEBUG
    org.springframework.security: DEBUG
    liquibase: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

card:
  encryption:
    key: ${CARD_ENCRYPTION_KEY:ThisIsA32ByteLongSecretKeyForAES!}