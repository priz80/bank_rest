# docs/openapi.yaml
openapi: 3.0.1
info:
  title: Bank Cards Management API
  description: REST API for managing bank cards, transfers, and user roles.
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Development server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          example: secret123

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.xxxxx
        user:
          $ref: '#/components/schemas/UserDto'

    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: john_doe
        role:
          type: string
          enum: [USER, ADMIN]
          example: USER

    CardDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 101
        maskedCardNumber:
          type: string
          example: "**** **** **** 1234"
        ownerName:
          type: string
          example: John Doe
        expiryDate:
          type: string
          format: date
          example: "2028-12-31"
        status:
          type: string
          enum: [ACTIVE, BLOCKED, EXPIRED]
          example: ACTIVE
        balance:
          type: number
          format: decimal
          example: 5000.00
        userId:
          type: integer
          format: int64
          example: 1

    CreateCardRequest:
      type: object
      required: [cardNumber, ownerName, expiryDate, balance]
      properties:
        cardNumber:
          type: string
          pattern: "^\d{4} \d{4} \d{4} \d{4}$"
          example: "1234 5678 9012 3456"
        ownerName:
          type: string
          example: John Doe
        expiryDate:
          type: string
          format: date
          example: "2028-12-31"
        balance:
          type: number
          format: decimal
          example: 1000.00

    TransferRequest:
      type: object
      required:
        - fromCardId
        - toCardId
        - amount
      properties:
        fromCardId:
          type: integer
          format: int64
          example: 1
          description: ID карты-отправителя
        toCardId:
          type: integer
          format: int64
          example: 2
          description: ID карты-получателя
        amount:
          type: number
          format: decimal
          example: 100.00
          description: Сумма перевода

  responses:
    BadRequest:
      description: Некорректные данные
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Доступ запрещён
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string

tags:
  - name: Auth
    description: Аутентификация пользователей
  - name: Cards
    description: Управление банковскими картами
  - name: Admin
    description: Функции администратора

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Аутентификация пользователя и получение JWT токена
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверные учётные данные

  /api/cards:
    get:
      tags:
        - Cards
      summary: Получить свои карты (с пагинацией)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Номер страницы
        - name: size
          in: query
          schema:
            type: integer
            default: 10
          description: Размер страницы
        - name: sort
          in: query
          schema:
            type: string
            default: "id,asc"
          description: Поле и направление сортировки (например: balance,desc)
      responses:
        '200':
          description: Список карт пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/CardDto'
                  totalPages:
                    type: integer
                  totalElements:
                    type: integer
                  size:
                    type: integer
                  number:
                    type: integer

    post:
      tags:
        - Cards
      summary: Создать новую карту (автогенерация номера, CVV, срока)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                  example: 1
                  description: ID пользователя (только для ADMIN)
      responses:
        '200':
          description: Карта создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDto'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/cards/{id}:
    get:
      tags:
        - Cards
      summary: Получить карту по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Данные карты
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDto'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Cards
      summary: Заблокировать карту
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Карта заблокирована
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDto'

    delete:
      tags:
        - Cards
      summary: Удалить карту (только ADMIN)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Карта удалена
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/cards/{id}/activate:
    post:
      tags:
        - Cards
      summary: Активировать карту (только ADMIN)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Карта активирована
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDto'

  /api/cards/transfers:
    post:
      tags:
        - Cards
      summary: Перевод средств между своими картами (по ID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Перевод выполнен успешно
          content:
            text/plain:
              schema:
                type: string
                example: "Перевод выполнен успешно"
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users:
    get:
      tags:
        - Admin
      summary: Получить всех пользователей (только ADMIN)
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
        '403':
          $ref: '#/components/responses/Forbidden'