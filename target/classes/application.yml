#
# application.yml — главный конфигурационный файл Spring Boot.

# Что нужно сделать:
#   - Указать настройки подключения к базе данных.
#   - Указать порт приложения.
#   - Настроить параметры безопасности и JWT.
#   - Включить Swagger UI.


server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/bankcards_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      use-new-id-generator-mappings: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/migration/master.xml
    enabled: true

jwt:
  secret: mySuperSecretKeyThatMustBeAtLeast32CharactersLongAndSecureForHS512!!!
  expiration: 86400000

logging:
  level:
    com.example.bankcards: DEBUG
    org.springframework.security: DEBUG
    liquibase: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs